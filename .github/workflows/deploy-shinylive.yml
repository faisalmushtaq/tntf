# Export the Shiny app to WebAssembly with shinylive and publish it on
# GitHub Pages. Runs on every push to main, so committing a new team sheet
# to data-raw/ automatically redeploys the app with updated statistics.
name: Deploy Shiny app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install shinylive
        run: Rscript -e 'install.packages("shinylive")'

      - name: Stage app files (only what the app needs)
        run: |
          mkdir -p app_stage
          cp app.R global.R app_stage/
          cp -r R data data-raw www app_stage/

      - name: Export app to WebAssembly
        run: Rscript -e 'shinylive::export("app_stage", "_site")'

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
